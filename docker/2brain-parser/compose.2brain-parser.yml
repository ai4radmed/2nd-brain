# compose.2brain-parser.yml — 2brain-parser 문서 파서 (PDF·docx·xlsx → markdown), ghcr pull.
#
# 사용자는 ghcr 이미지를 pull (빌드 X). 자세한 안내: docs/2brain-parser-container.md
#   docker pull ghcr.io/ai4radmed/2brain-parser:latest
#   export UID=$(id -u) GID=$(id -g)
#   docker compose -f docker/2brain-parser/compose.2brain-parser.yml \
#                  run --rm 2brain-parser 2brain-parser parse-docling <pdf>
#   (service 명 = CLI 명 = 2brain-parser 라 두 번 나옴 — docker compose run <service> <command>)
#
# GPU(수식 PDF): -f compose.2brain-parser.gpu.yml 오버레이 추가.
# 첫 실행 시 HF 모델 ~5GB 가 2brain-parser-models 볼륨에 다운로드(영속).

services:
  2brain-parser:
    image: ghcr.io/ai4radmed/2brain-parser:${PARSER_VERSION:-latest}
    container_name: 2brain-parser
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /home/user/work
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    environment:
      HF_HOME: /home/user/.cache/huggingface
      TRANSFORMERS_OFFLINE: "0"               # 첫 실행 모델 다운로드 허용 (이후 offline 가능)
    stdin_open: true
    tty: true
    volumes:
      - ${SB_DATA:-${HOME}/projects/2nd-brain-vault}:/home/user/projects/2nd-brain-vault
      - 2brain-parser-models:/home/user/.cache/huggingface
    command: ["sleep", "infinity"]            # 데몬 default; `run` 으로 override

volumes:
  2brain-parser-models:
