# compose.openclaw.yml — containerized OpenClaw gateway (control plane).
#
# Standalone. Replaces the host systemd-user openclaw-gateway.service.
#
#   make build-openclaw   # build (thin derivation of official ghcr image)
#   make up-openclaw      # start (after host gateway stopped+disabled)
#   make logs-openclaw / down-openclaw / restart-openclaw / shell-openclaw
#
# OFFICIAL-IMAGE ALIGNMENT (2026-05-17): image is FROM
# ghcr.io/openclaw/openclaw:<OPENCLAW_VERSION> + claude/uv/Chromium only.
# So this file follows the official Docker method semantics:
#   - user `node`, HOME=/home/node, app at /app, official docker-entrypoint.sh
#     + default CMD inherited (do NOT override command/user/working_dir).
#   - OPENCLAW_PLUGIN_STAGE_DIR -> named volume (official requirement: Gateway
#     startup stages generated plugin/skill runtime deps there; keeping that
#     high-churn tree out of the ~/.openclaw bind mount is mandatory, and a
#     mis-staged skill plugin is the suspected cron skill-injection blocker).
#
# SECURITY MODEL: this container IS the sandbox. openclaw.json
# agents.defaults.sandbox.mode=off (no nested docker-in-docker sandbox). The
# container<->host bind-mount surface below is the entire trust boundary.
#
# gog: Option B privilege-separated, OpenClaw-own identity (client
# `openclaw-container`, ~/.config/gogcli-openclaw-container RO, own passphrase).
# Host full-privilege ~/.config/gogcli is NOT mounted. Container compromise !=
# host Google-API compromise.

services:
  openclaw:
    build:
      context: ./images/openclaw-gateway
      args:
        OPENCLAW_VERSION: ${OPENCLAW_VERSION:?set OPENCLAW_VERSION in .env (pin 2026.4.21 — see docs/openclaw-setup.md)}
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:?set CLAUDE_CODE_VERSION in .env}
    image: 2nd-brain/openclaw-gateway:${OPENCLAW_VERSION}
    container_name: sb-openclaw
    # user / working_dir / entrypoint / command: inherited from the official
    # image (node uid1000, /app, docker-entrypoint.sh, `gateway`). Do NOT
    # override — that is the whole point of the official-image realignment.
    security_opt:
      - no-new-privileges:true
    # cap_drop:ALL intentionally NOT set — OpenClaw spawns Chromium
    # (webmail-watch); the container boundary is the security model.
    init: true
    environment:
      HOME: /home/node
      TMPDIR: /tmp
      NODE_EXTRA_CA_CERTS: /etc/ssl/certs/ca-certificates.crt
      OPENCLAW_GATEWAY_PORT: "18789"
      OPENCLAW_DISABLE_BONJOUR: "1"
      # lan so the host browser/CLI can reach the published 127.0.0.1:18789.
      OPENCLAW_GATEWAY_BIND: lan
      # OFFICIAL persistence requirement: generated plugin/skill runtime deps
      # stage here (named volume below), not in the ~/.openclaw bind mount.
      OPENCLAW_PLUGIN_STAGE_DIR: /var/lib/openclaw/plugin-runtime-deps
      # gog Option B keyring unlock — OpenClaw-own passphrase (.env, Phase 2).
      GOG_KEYRING_PASSWORD: ${GOG_OPENCLAW_KEYRING_PASSWORD:?set GOG_OPENCLAW_KEYRING_PASSWORD in .env (openclaw-container client; see docs/gogcli-container-setup.md)}
      # research agent uses google/gemini-2.5-flash.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # WSLg headed Chromium (webmail-watch bootstrap/demo). Headless cron
      # path does not need it; harmless if the socket is absent.
      DISPLAY: ${DISPLAY:-:0}
      PLAYWRIGHT_BROWSERS_PATH: /opt/ms-playwright
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      # All OpenClaw persistent state (config, agents memory, cron jobs.json,
      # credentials, telegram pairing, workspace+skills). Official config dir
      # = /home/node/.openclaw.
      - ${HOME}/.openclaw:/home/node/.openclaw
      # Claude OAuth credentials — claude-cli/* subprocess path reads here.
      - ${HOME}/.claude:/home/node/.claude
      # The vault — gws-assistant writes companion notes; webmail-watch too.
      # HOME=/home/node so ~/projects/2nd-brain-vault imports still resolve.
      - ${SB_DATA:-${HOME}/projects/2nd-brain-vault}:/home/node/projects/2nd-brain-vault
      - ${SB_GUIDE:-${HOME}/projects/2nd-brain-vault-guide}:/home/node/projects/2nd-brain-vault-guide
      # gog: statically-linked binary (RO) + OpenClaw-own client config (RO).
      - /usr/local/bin/gog:/usr/local/bin/gog:ro
      - ${HOME}/.config/gogcli-openclaw-container:/home/node/.config/gogcli:ro
      # WSLg X11 socket for headed Chromium (optional; bootstrap/demo only).
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # OFFICIAL: generated plugin/skill runtime deps — named volume, kept out
      # of the high-churn ~/.openclaw bind mount.
      - openclaw-plugin-runtime-deps:/var/lib/openclaw/plugin-runtime-deps
    restart: unless-stopped

volumes:
  openclaw-plugin-runtime-deps:
