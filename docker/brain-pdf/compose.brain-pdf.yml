# compose.brain-pdf.yml — brain-pdf 문서 파서 (PDF·docx·xlsx → markdown), 로컬 빌드.
#
# 사용자가 로컬에서 직접 빌드 (레지스트리 불필요). 자세한 안내: docs/brain-pdf-container.md
#   export UID=$(id -u) GID=$(id -g)
#   docker compose -f docker/brain-pdf/compose.brain-pdf.yml build brain-pdf      # 1회 (~10-20분)
#   docker compose -f docker/brain-pdf/compose.brain-pdf.yml run --rm brain-pdf parse-docling <pdf>
#
# GPU(수식 PDF): -f compose.brain-pdf.gpu.yml 오버레이 추가 (docs 참조).
# 첫 실행 시 HF 모델 ~5GB 가 brain-pdf-models 볼륨에 다운로드(영속).

services:
  brain-pdf:
    build:
      context: .                              # 이 디렉토리(docker/brain-pdf/)의 Dockerfile
      args:
        UID: ${UID:-1000}                     # 빌드 시 사용자 uid 베이킹 (로컬 빌드라 이식성 OK)
        GID: ${GID:-1000}
    image: 2nd-brain/brain-pdf:${BRAIN_PDF_VERSION:-local}
    container_name: brain-pdf
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /home/user/work
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    environment:
      HF_HOME: /home/user/.cache/huggingface
      TRANSFORMERS_OFFLINE: "0"               # 첫 실행 모델 다운로드 허용 (이후 offline 가능)
    stdin_open: true
    tty: true
    volumes:
      - ${SB_DATA:-${HOME}/projects/2nd-brain-vault}:/home/user/projects/2nd-brain-vault
      - brain-pdf-models:/home/user/.cache/huggingface
    command: ["sleep", "infinity"]            # 데몬 default; `run` 으로 override

volumes:
  brain-pdf-models:
